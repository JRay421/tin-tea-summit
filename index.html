<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Logo Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="partner-section" aria-labelledby="partner-heading">
    <h2 id="partner-heading" class="partner-heading">Our Partners</h2>

    <div class="logo-carousel" aria-label="Partner organizations">
      <div class="logo-track">

        <!-- Original logo group -->
        <a class="logo-item" href="https://www.creeed.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/creeed.png" alt="CREEED">
        </a>

        <a class="logo-item" href="https://www.e2epartners.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/e2e-partners.png" alt="Education to Employment Partners">
        </a>

        <a class="logo-item" href="https://e3alliance.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/e3-alliance.png" alt="E3 Alliance">
        </a>

        <a class="logo-item" href="https://educatepb.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/education-partnership-permian-basin.png" alt="Education Partnership of the Permian Basin">
        </a>

        <a class="logo-item" href="https://goodreasonhouston.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/good-reason-houston.png" alt="Good Reason Houston">
        </a>

        <a class="logo-item" href="https://www.prosperwaco.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/prosper-waco.png" alt="Prosper Waco">
        </a>

        <a class="logo-item" href="https://www.revpartnership.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/rev-partnership.jpg" alt="REV Partnership">
        </a>

        <a class="logo-item" href="https://edtx.org/program/rgv-focus/" target="_blank" rel="noopener noreferrer">
          <img src="images/rgv-focus.png" alt="RGV FOCUS">
        </a>

        <a class="logo-item" href="https://t3partnership.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/t3-partnership.png" alt="Tarrant To and Through Partnership">
        </a>

        <a class="logo-item" href="https://www.commitpartnership.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/commit-partnership.png" alt="The Commit Partnership">
        </a>

        <a class="logo-item" href="https://uppartnership.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/up-partnership.png" alt="UP Partnership">
        </a>

        <a class="logo-item" href="https://wfswct.org/" target="_blank" rel="noopener noreferrer">
          <img src="images/workforce-solutions-wct.png" alt="Workforce Solutions of West Central Texas">
        </a>

        <!-- Duplicate group for seamless scrolling -->
        <div class="logo-item" aria-hidden="true"><img src="images/creeed.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/e2e-partners.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/e3-alliance.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/education-partnership-permian-basin.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/good-reason-houston.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/prosper-waco.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/rev-partnership.jpg" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/rgv-focus.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/t3-partnership.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/commit-partnership.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/up-partnership.png" alt=""></div>
        <div class="logo-item" aria-hidden="true"><img src="images/workforce-solutions-wct.png" alt=""></div>

      </div>
    </div>
  </section>
</body>
</html>
